<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>To-Do List</title>
<style>
  :root {
    --bg: #faf7f2;
    --ink: #2b2620;
    --ink-soft: #6b6355;
    --accent: #3d5a4a;
    --line: #e6e0d4;
    --danger: #b9543f;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Georgia', 'Iowan Old Style', serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    min-height: 100vh;
    padding: 32px 16px;
    display: flex;
    justify-content: center;
  }
  .todo-wrap { width: 100%; max-width: 480px; }
  .todo-eyebrow {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft); margin: 0 0 4px 0;
  }
  .todo-title { font-size: 30px; margin: 0 0 20px 0; font-weight: 700; }
  .todo-input-row { display: flex; gap: 8px; margin-bottom: 18px; }
  .todo-input {
    flex: 1; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 15px;
    padding: 11px 14px; border: 1px solid var(--line); border-radius: 8px;
    background: white; color: var(--ink); outline: none;
  }
  .todo-input:focus { border-color: var(--accent); }
  .todo-add-btn {
    font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 600;
    padding: 11px 18px; border: none; border-radius: 8px; background: var(--accent);
    color: white; cursor: pointer;
  }
  .todo-list { list-style: none; margin: 0; padding: 0; }
  .todo-item { display: flex; align-items: center; gap: 12px; padding: 13px 4px; border-bottom: 1px solid var(--line); }
  .todo-check {
    width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--accent);
    background: white; cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 13px; color: white;
  }
  .todo-check.done { background: var(--accent); }
  .todo-text { flex: 1; font-size: 16px; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .todo-text.done { text-decoration: line-through; color: var(--ink-soft); }
  .todo-del {
    font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: var(--danger);
    background: none; border: none; cursor: pointer; padding: 4px 6px; opacity: 0.7;
  }
  .todo-del:hover { opacity: 1; }
  .todo-empty { font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--ink-soft); font-size: 14px; text-align: center; padding: 30px 0; }
  .todo-footer { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: var(--ink-soft); margin-top: 14px; text-align: right; }
</style>
</head>
<body>
  <div class="todo-wrap">
    <p class="todo-eyebrow">Daftar Tugas</p>
    <h1 class="todo-title">To-Do List</h1>
    <div class="todo-input-row">
      <input class="todo-input" id="todo-input" type="text" placeholder="Tulis tugas baru..." />
      <button class="todo-add-btn" id="todo-add-btn">Tambah</button>
    </div>
    <ul class="todo-list" id="todo-list"></ul>
    <div class="todo-footer" id="todo-footer"></div>
  </div>

<script>
  async function fetchTodos() {
    const res = await fetch('/api/todos');
    return res.json();
  }

  async function addTodo(text) {
    await fetch('/api/todos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
  }

  async function toggleTodo(id) {
    await fetch(`/api/todos/${id}/toggle`, { method: 'PATCH' });
  }

  async function deleteTodo(id) {
    await fetch(`/api/todos/${id}`, { method: 'DELETE' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function render() {
    const todos = await fetchTodos();
    const list = document.getElementById('todo-list');
    const footer = document.getElementById('todo-footer');

    list.innerHTML = todos.length === 0
      ? `<div class="todo-empty">Belum ada tugas. Tambahkan satu di atas.</div>`
      : todos.map(t => `
        <li class="todo-item" data-id="${t.id}">
          <button class="todo-check ${t.done ? 'done' : ''}" data-action="toggle" data-id="${t.id}">${t.done ? '✓' : ''}</button>
          <span class="todo-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</span>
          <button class="todo-del" data-action="delete" data-id="${t.id}">Hapus</button>
        </li>
      `).join('');

    footer.textContent = todos.length > 0
      ? `${todos.filter(t => t.done).length} dari ${todos.length} selesai`
      : '';

    list.querySelectorAll('[data-action="toggle"]').forEach(btn => {
      btn.addEventListener('click', async () => { await toggleTodo(btn.dataset.id); render(); });
    });
    list.querySelectorAll('[data-action="delete"]').forEach(btn => {
      btn.addEventListener('click', async () => { await deleteTodo(btn.dataset.id); render(); });
    });
  }

  document.getElementById('todo-add-btn').addEventListener('click', async () => {
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if (!text) return;
    await addTodo(text);
    input.value = '';
    render();
  });

  document.getElementById('todo-input').addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') document.getElementById('todo-add-btn').click();
  });

  render();
</script>
</body>
</html>
